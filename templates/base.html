<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PayMonero{% endblock %}</title>
    <style>
        /* ── Reset ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Variables ──────────────────────────────────────── */
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-dim: #777;
            --text-bright: #fff;
            --accent: #ff6600;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #a855f7;
            --mono: 'Courier New', 'Lucida Console', monospace;
            --sans: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        /* ── Base ───────────────────────────────────────────── */
        html { font-size: 15px; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Layout ─────────────────────────────────────────── */
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        /* ── Nav ────────────────────────────────────────────── */
        nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .nav-brand {
            font-family: var(--mono);
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: -0.5px;
        }
        .nav-brand span { color: var(--text-dim); font-weight: normal; }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text-dim); font-size: 0.9rem; }
        .nav-links a:hover { color: var(--text); text-decoration: none; }

        /* ── Cards ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }

        /* ── Stats row ──────────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat { text-align: center; }
        .stat-value {
            font-family: var(--mono);
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--text-bright);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }

        /* ── Table ──────────────────────────────────────────── */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: normal;
        }
        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:hover td { background: var(--bg-hover); }
        .mono { font-family: var(--mono); font-size: 0.8rem; }
        .dim { color: var(--text-dim); }
        .right { text-align: right; }

        /* ── Status badges ──────────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-paid { background: #052e16; color: var(--green); border: 1px solid #166534; }
        .status-pending { background: #1a1600; color: var(--yellow); border: 1px solid #854d0e; }
        .status-partial { background: #1a0a2e; color: var(--purple); border: 1px solid #7e22ce; }
        .status-new { background: #0a1a2e; color: var(--blue); border: 1px solid #1d4ed8; }
        .status-expired { background: #1a1a1a; color: var(--text-dim); border: 1px solid var(--border); }
        .status-cancelled { background: #2a0a0a; color: var(--red); border: 1px solid #991b1b; }

        /* ── Filters ────────────────────────────────────────── */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-dim);
            font-size: 0.8rem;
            background: transparent;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); text-decoration: none; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #1a0d00; }

        /* ── Pagination ─────────────────────────────────────── */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .pagination a:hover { border-color: var(--accent); color: var(--text); text-decoration: none; }
        .pagination .current { border-color: var(--accent); color: var(--accent); }

        /* ── Detail page ────────────────────────────────────── */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

        .field { margin-bottom: 1rem; }
        .field-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
        }
        .field-value { font-family: var(--mono); word-break: break-all; }
        .field-value.large { font-size: 1.3rem; color: var(--text-bright); }

        /* ── Payment page ───────────────────────────────────── */
        .pay-container {
            max-width: 480px;
            margin: 2rem auto;
        }
        .pay-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .pay-amount {
            font-family: var(--mono);
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .pay-amount-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
        }
        .qr-container {
            text-align: center;
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: #fff;
            border-radius: 8px;
            display: inline-block;
        }
        .qr-container svg { display: block; }
        .address-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            word-break: break-all;
            text-align: center;
            color: var(--text);
            margin: 1rem 0;
        }
        .timer {
            text-align: center;
            font-family: var(--mono);
            color: var(--text-dim);
            font-size: 0.9rem;
            margin: 1rem 0;
        }
        .pay-status-box {
            text-align: center;
            padding: 2rem;
        }
        .pay-status-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .refresh-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
        }
        .refresh-link:hover { border-color: var(--accent); text-decoration: none; }

        /* ── Utilities ──────────────────────────────────────── */
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }
        .mt-1 { margin-top: 1rem; }
        .text-center { text-align: center; }
        .text-green { color: var(--green); }
        .text-yellow { color: var(--yellow); }
        .text-red { color: var(--red); }
        .text-purple { color: var(--purple); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
