<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PayMonero{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: monospace;
            background: #fff;
            color: #000;
            line-height: 1.6;
            font-size: 14px;
        }

        a { color: #000; }
        a:hover { color: #555; }

        .wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* nav */
        nav {
            border-bottom: 1px solid #000;
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .brand { font-weight: bold; font-size: 1rem; }
        .nav-links { display: flex; gap: 1.5rem; }

        /* tables */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            border-bottom: 1px solid #000;
            padding: 0.4rem 0.5rem;
            font-weight: bold;
        }
        td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #ddd; }
        tr:last-child td { border-bottom: none; }

        /* stats */
        .stats { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #555; }

        /* filters */
        .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .filter-btn {
            padding: 0.2rem 0.7rem;
            border: 1px solid #000;
            text-decoration: none;
            color: #555;
            font-size: 12px;
        }
        .filter-btn:hover { color: #000; }
        .filter-btn.active { background: #000; color: #fff; }

        /* pagination */
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
        .pagination a, .pagination span {
            padding: 0.2rem 0.6rem;
            border: 1px solid #ccc;
            font-size: 12px;
            color: #000;
            text-decoration: none;
        }
        .pagination a:hover { border-color: #000; }
        .pagination .current { background: #000; color: #fff; border-color: #000; }

        /* pay page */
        .pay-wrap { max-width: 420px; margin: 0 auto; text-align: center; }
        .pay-amount { font-size: 2.5rem; font-weight: bold; margin: 1rem 0 0.25rem; }
        .pay-label { font-size: 12px; color: #555; margin-bottom: 1.5rem; }

        .qr-box {
            display: inline-block;
            border: 1px solid #000;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .qr-box svg { display: block; }

        .address {
            font-size: 11px;
            word-break: break-all;
            border: 1px solid #ccc;
            padding: 0.5rem;
            margin: 0.75rem 0;
            text-align: left;
        }

        .timer { font-size: 12px; color: #555; margin: 0.5rem 0 1rem; }
        .timer.urgent { color: #c00; }

        .hint { font-size: 12px; color: #555; border-top: 1px solid #ddd; padding-top: 0.75rem; margin-top: 0.75rem; }

        /* status page */
        .status-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .status-msg { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .status-sub { font-size: 13px; color: #555; }

        /* detail */
        .fields { margin-bottom: 1.5rem; }
        .field { margin-bottom: 0.75rem; }
        .field-label { font-size: 11px; text-transform: uppercase; color: #555; }
        .field-value { word-break: break-all; }
        .field-value.large { font-size: 1.4rem; font-weight: bold; }

        /* badges */
        .badge { font-size: 11px; border: 1px solid #000; padding: 0.1rem 0.4rem; text-transform: uppercase; }

        /* utils */
        .mt { margin-top: 1rem; }
        .mb { margin-bottom: 1rem; }
        .dim { color: #555; }
        .green { color: #060; }
        .red { color: #c00; }
        .section-title { font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 0.25rem; margin-bottom: 1rem; }
        .btn {
            display: inline-block;
            border: 1px solid #000;
            padding: 0.4rem 1.2rem;
            text-decoration: none;
            color: #000;
            font-size: 13px;
            margin-top: 1rem;
        }
        .btn:hover { background: #000; color: #fff; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="wrap">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
